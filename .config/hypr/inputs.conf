# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
    }
}

gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen, maximize
gesture = 3, pinch, fullscreen

gesture = 4, horizontal, move
gesture = 4, vertical, move
gesture = 4, pinch, float
